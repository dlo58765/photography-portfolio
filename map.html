<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photography Map</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <style>
        :root {
            --bg: #090b12;
            --surface: rgba(14, 19, 34, 0.96);
            --text: #f5f4ef;
            --muted: #9aa0ac;
            --muted-strong: #c8c8c6;
            --accent: #7ec7ff;
            --accent-strong: #55a8ff;
            --border: rgba(255, 255, 255, 0.08);
            --shadow: 0 30px 90px rgba(0, 0, 0, 0.22);
            --radius: 22px;
            --radius-sm: 14px;
            --transition: 0.28s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            min-height: 100vh;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        .container, #map {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #050608;
            color: var(--text);
            line-height: 1.6;
        }

        .container {
            position: relative;
        }

        #map {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1;
        }

        .location-list {
            display: none;
        }

        .location-item {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 18px;
            padding: 18px 18px 16px;
            cursor: pointer;
            transition: transform var(--transition), border-color var(--transition), background var(--transition), box-shadow var(--transition), opacity var(--transition);
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateX(-10px);
            animation: slideInItem 0.45s ease forwards;
        }

        .location-item::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 70%);
            pointer-events: none;
        }

        .location-item:hover {
            transform: translateX(4px);
            border-color: rgba(126, 199, 255, 0.45);
            background: rgba(126, 199, 255, 0.08);
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.18);
        }

        @keyframes slideInItem {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .pulse-marker {
            width: 34px;
            height: 34px;
            position: relative;
            transform: translate(-50%, -50%);
            animation: float-marker 4s ease-in-out infinite;
        }

        .pulse-marker::after {
            content: "";
            position: absolute;
            inset: 6px;
            border-radius: 50%;
            border: 2px solid rgba(255, 199, 102, 0.54);
            box-shadow: 0 0 18px rgba(255, 188, 76, 0.24);
            pointer-events: none;
        }

        .pulse-marker .pulse-ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: rgba(255, 183, 73, 0.28);
            animation: pulse-ring 1.8s infinite ease-out;
        }

        .pulse-marker .marker-core {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 16px;
            height: 16px;
            background: #ffbf47;
            border: 3px solid rgba(255, 255, 255, 0.95);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 22px rgba(255, 191, 87, 0.5);
            transition: transform var(--transition), background var(--transition), box-shadow var(--transition), border-color var(--transition);
        }

        .pulse-marker.active .marker-core,
        .pulse-marker:hover .marker-core {
            background: #ffd568;
            transform: translate(-50%, -50%) scale(1.25);
            box-shadow: 0 0 32px rgba(255, 210, 115, 0.7);
            border-color: rgba(255, 255, 255, 1);
        }

        @keyframes pulse-ring {
            0% {
                transform: scale(0.9);
                opacity: 0.65;
            }
            70% {
                transform: scale(2.4);
                opacity: 0;
            }
            100% {
                transform: scale(2.8);
                opacity: 0;
            }
        }

        @keyframes float-marker {
            0%, 100% {
                transform: translate(-50%, -50%) translateY(0px);
            }
            50% {
                transform: translate(-50%, -50%) translateY(-2px);
            }
        }

        .location-item.active {
            background: rgba(126, 199, 255, 0.16);
            border-color: rgba(126, 199, 255, 0.7);
        }

        .location-name {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 6px;
        }

        .location-count {
            font-size: 0.95rem;
            color: var(--muted);
        }

        .map-tip {
            position: absolute;
            right: 26px;
            top: 24px;
            z-index: 9;
            padding: 14px 18px;
            border-radius: 18px;
            background: rgba(7, 12, 24, 0.86);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text);
            font-size: 0.95rem;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.24);
            backdrop-filter: blur(16px);
            max-width: min(320px, calc(100vw - 46px));
        }

        .toggle-sidebar {
            display: none;
        }

        .map-tip strong {
            color: var(--accent);
        }

        .leaflet-popup-content {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: var(--text);
            text-align: left;
        }

        .leaflet-popup-content-wrapper {
            background: rgba(11, 16, 29, 0.98);
            border: 1px solid rgba(126, 199, 255, 0.18);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.28);
            border-radius: 18px;
        }

        .leaflet-popup-tip {
            filter: drop-shadow(0 10px 18px rgba(0, 0, 0, 0.16));
        }

        .leaflet-popup-pane,
        .leaflet-popup-tip {
            box-shadow: none;
        }

        .popup-content {
            text-align: center;
        }

        .popup-title {
            font-weight: 800;
            font-size: 1.05rem;
            margin-bottom: 10px;
            color: #ffffff;
            letter-spacing: 0.01em;
        }

        .popup-info {
            font-size: 0.97rem;
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 14px;
        }

        .popup-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 16px;
            border-radius: 999px;
            background: var(--accent);
            color: #090b12;
            text-decoration: none;
            font-size: 0.95rem;
            transition: background var(--transition);
        }

        .popup-btn:hover {
            background: var(--accent-strong);
        }

        @media (max-width: 768px) {
            .toggle-sidebar {
                width: 38px;
                height: 38px;
                font-size: 18px;
            }

            .toggle-sidebar.is-open {
                left: 20px;
            }

            .sidebar {
                width: 100%;
            }

            .sidebar.is-open {
                transform: translateX(0);
            }

            .sidebar {
                padding-top: 82px;
            }

            .map-tip {
                right: 20px;
                top: auto;
                bottom: 20px;
                left: auto;
            }
        }

        @media (max-width: 640px) {
            .sidebar {
                padding: 18px 16px 18px;
            }

            .sidebar-header {
                font-size: 1.6rem;
            }

            .sidebar-summary span {
                width: 100%;
                justify-content: space-between;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="map"></div>
        <div class="map-tip"><strong>提示：</strong>點擊地圖標記以查看相冊。</div>
    </div>

    <script src="locations-data.js"></script>
    <script>
        // ===== 判斷要顯示哪一個系列 =====
        // ?series=iceland  →  冰島  ;  預設為挪威
        const params = new URLSearchParams(window.location.search);
        const series = (params.get('series') || 'norway').toLowerCase();

        const SERIES = {
            norway: {
                locations: LOCATIONS_DATA,
                targetHtml: 'norway.html',
                center: [69.2, 16.0],
                zoom: 6.8,
                minZoom: 6
            },
            iceland: {
                locations: ICELAND_LOCATIONS_DATA,
                targetHtml: 'iceland.html',
                center: [64.9, -18.5],
                zoom: 6.4,
                minZoom: 5
            }
        };

        const cfg = SERIES[series] || SERIES.norway;
        const locations = cfg.locations;

        const map = L.map('map', {
            minZoom: cfg.minZoom,
            maxZoom: 19
        });
        map.setView(cfg.center, cfg.zoom);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png', {
            attribution: 'Map tiles by CartoDB, under CC BY 3.0. Data by OpenStreetMap, under ODbL.',
            subdomains: 'abcd',
            maxZoom: 19
        }).addTo(map);

        // 建立標記
        const markers = {};

        function createMarkers() {
            Object.entries(locations).forEach(([key, location]) => {
                const markerHtml = `
                    <div class="pulse-marker" data-key="${key}">
                        <span class="pulse-ring"></span>
                        <span class="marker-core"></span>
                    </div>
                `;
                const marker = L.marker([location.lat, location.lng], {
                    icon: L.divIcon({
                        className: 'custom-div-icon',
                        html: markerHtml,
                        iconSize: [28, 28],
                        iconAnchor: [14, 14]
                    }),
                    title: location.name
                }).addTo(map);

                marker.bindTooltip(location.name, {
                    permanent: false,
                    direction: 'top',
                    opacity: 0.9,
                    className: 'location-tooltip'
                });

                marker.on('click', () => {
                    window.location.href = `${cfg.targetHtml}#stop-${location.number}`;
                });

                markers[key] = marker;
            });
        }

        createMarkers();
    </script>
</body>
</html>
