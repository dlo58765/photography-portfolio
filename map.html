<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photography Map - Norway</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #1a1a1a;
            color: #fff;
        }
        
        .container {
            display: flex;
            height: 100vh;
            position: relative;
        }
        
        #map {
            flex: 1;
            z-index: 1;
            width: 100%;
        }
        
        .sidebar {
            width: 320px;
            background: #2a2a2a;
            overflow-y: auto;
            padding: 20px;
            border-right: 1px solid #444;
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            z-index: 10;
            transition: transform 0.3s ease;
            transform: translateX(-100%);
        }
        
        .sidebar.is-open {
            transform: translateX(0);
        }
        
        .toggle-sidebar {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 11;
            background: #4a9eff;
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 20px;
            transition: background 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .toggle-sidebar:hover {
            background: #3a8eef;
        }
        
        .toggle-sidebar.is-open {
            left: 340px;
        }
        
        .sidebar-header {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .location-list {
            list-style: none;
        }
        
        .location-item {
            background: #3a3a3a;
            border: 1px solid #555;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .location-item:hover {
            background: #444;
            border-color: #666;
            transform: translateX(5px);
        }
        
        .location-name {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 5px;
        }
        
        .location-count {
            font-size: 12px;
            color: #aaa;
        }
        
        .location-item.active {
            background: #4a9eff;
            border-color: #4a9eff;
        }
        
        .location-item.active .location-count {
            color: #fff;
        }
        
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            padding: 8px 12px;
            background: #4a9eff;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-size: 14px;
            transition: background 0.3s ease;
        }
        
        .back-link:hover {
            background: #3a8eef;
        }
        
        @media (max-width: 768px) {
            .toggle-sidebar {
                width: 36px;
                height: 36px;
                font-size: 18px;
            }
            
            .toggle-sidebar.is-open {
                left: 320px;
            }
            
            .sidebar {
                width: 100%;
            }
        }
        
        .leaflet-popup-content {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        .popup-content {
            text-align: center;
        }
        
        .popup-title {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 8px;
        }
        
        .popup-info {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }
        
        .popup-btn {
            display: inline-block;
            background: #4a9eff;
            color: white;
            padding: 8px 16px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 14px;
            transition: background 0.3s ease;
        }
        
        .popup-btn:hover {
            background: #3a8eef;
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="toggle-sidebar" id="toggleBtn">☰</button>
        <div class="sidebar" id="sidebar">
            <a href="index.html" class="back-link">← 返回</a>
            <div class="sidebar-header">挪威地點</div>
            <ul class="location-list" id="locationList"></ul>
        </div>
        <div id="map"></div>
    </div>

    <script src="locations-data.js"></script>
    <script src="norway-manifests.js"></script>
    <script>
        // ===== 側邊欄切換功能 =====
        const sidebar = document.getElementById('sidebar');
        const toggleBtn = document.getElementById('toggleBtn');
        
        toggleBtn.addEventListener('click', () => {
            sidebar.classList.toggle('is-open');
            toggleBtn.classList.toggle('is-open');
        });
        
        // 點擊地點時關閉側邊欄
        document.addEventListener('click', (e) => {
            if (e.target.closest('.location-item')) {
                sidebar.classList.remove('is-open');
                toggleBtn.classList.remove('is-open');
            }
        });

        // 使用導入的地點數據
        const locations = LOCATIONS_DATA;

        // 從 norway-manifests.js 引入的數據已經設置在 window.NORWAY_MANIFESTS
        let manifests = window.NORWAY_MANIFESTS || {};

        // 初始化地圖 - 限制在挪威北部範圍內
        const norwayBounds = L.latLngBounds(
            L.latLng(67.5, 12.5),  // 西南角
            L.latLng(70.5, 20.5)   // 東北角
        );

        const map = L.map('map', {
            maxBounds: norwayBounds,
            maxBoundsViscosity: 1.0,
            minZoom: 7,
            maxZoom: 19
        });
        map.fitBounds(norwayBounds);

        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles © Esri — Esri, DeLorme, NAVTEQ, TomTom, Intermap, iPC, USGS, FAO, NPS, NRCAN, GeoBase, Kadaster NL, Ordnance Survey, Esri Japan, METI, Esri China (Hong Kong), and the GIS User Community',
            maxZoom: 19,
            bounds: norwayBounds
        }).addTo(map);

        // 建立標記
        const markers = {};
        let activeMarker = null;
        const locationList = document.getElementById('locationList');

        function createMarkers() {
            // 添加標記和彈出窗口
            Object.entries(locations).forEach(([key, location]) => {
                const photoCount = manifests[key] ? manifests[key].frames.length : 0;
                
                const marker = L.circleMarker([location.lat, location.lng], {
                    radius: 8,
                    fillColor: '#4a9eff',
                    color: '#fff',
                    weight: 2,
                    opacity: 1,
                    fillOpacity: 0.8
                }).addTo(map);

                const popupContent = `
                    <div class="popup-content">
                        <div class="popup-title">${location.name}</div>
                        <div class="popup-info">${photoCount} 張照片</div>
                        <a href="norway.html#stop-${location.number}" class="popup-btn">查看相冊</a>
                    </div>
                `;

                marker.bindPopup(popupContent);
                marker.on('click', () => {
                    activeMarker = marker;
                    updateSidebarActive(key);
                });

                markers[key] = marker;
            });
        }

        function createSidebarItems() {
            // 清空現有項目
            locationList.innerHTML = '';
            
            // 更新側邊欄
            Object.entries(locations).forEach(([key, location]) => {
                const photoCount = manifests[key] ? manifests[key].frames.length : 0;
                const li = document.createElement('li');
                li.className = 'location-item';
                li.innerHTML = `
                    <div class="location-name">${location.name}</div>
                    <div class="location-count">${photoCount} 張照片</div>
                `;
                
                li.addEventListener('click', () => {
                    // 導航到 norway.html 並滾動到相應地點
                    window.location.href = `norway.html#stop-${location.number}`;
                });
                
                locationList.appendChild(li);
            });
        }

        function updateSidebarActive(key) {
            document.querySelectorAll('.location-item').forEach(item => {
                item.classList.remove('active');
            });
            const items = document.querySelectorAll('.location-item');
            const index = Object.keys(locations).indexOf(key);
            if (items[index]) {
                items[index].classList.add('active');
            }
        }

        // 初始化標記和側邊欄
        createMarkers();
        createSidebarItems();
    </script>
</body>
</html>
